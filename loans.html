<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

          content="width=device-width, initial-scale=1.0">

    <title>Loans Page</title>

    <link rel="stylesheet"
          href="css/style.css">
style
</head>
<script src="js/loans.js"></script>

<body>

<div class="sidebar">

    <h2>Loan System</h2>
    <ul>
        <li>
            <a href="dashboard.html">
                Dashboard
            </a>
        </li>

        <li>
            <a href="members.html">
                Members
            </a>
        </li>

        <li>
            <a href="loans.html">
                Loans
            </a>
        </li>

        <li>

                Reports
            </a>
        </li>

        <li>
            <a href="login.html">
                Logout
            </a>
        </li>

    </ul>

</div>

<div class="main-content">

    <h1>Loan Eligibility Form</h1>

    <form>

        <label>Contribution Amount</label>

        <input type="number"
               id="contribution"
               placeholder="Enter Contribution Amount">

        <label>Attendance Score</label>

        <input type="number"
               id="attendance"
               placeholder="Enter Attendance Score">

        <label>Participation Score</label>

        <input type="number"
               id="participation"
               placeholder="Enter Participation Score">

        <button type="button"
                onclick="calculateScore()">

            Calculate Eligibility

        </button>

    </form>

    <div class="result">

        <h2 id="totalScore"></h2>

        <h2 id="eligibility"></h2>

    </div>

</div>

<script src="js/script.js"></script>

</body>
